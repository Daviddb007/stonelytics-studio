<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stonelytics Studio</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #334155; --surface3: #1a2332;
    --text: #e2e8f0; --text2: #94a3b8; --accent: #3b82f6;
    --green: #22c55e; --amber: #f59e0b; --red: #ef4444; --border: #334155;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

  .shell { display: grid; grid-template-columns: 48px 1fr; height: 100vh; }

  .activity-bar { background: var(--surface3); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 16px 0; gap: 4px; }
  .activity-bar .a-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; color: var(--text2); font-size: 16px; border: none; background: none; }
  .activity-bar .a-btn:hover { background: var(--surface2); color: var(--text); }
  .activity-bar .a-btn.active { background: var(--accent); color: #fff; }
  .activity-bar .bottom { margin-top: auto; }

  .workbench { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  .topbar { display: flex; align-items: center; gap: 12px; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .topbar .brand { font-size: 14px; font-weight: 600; color: var(--accent); }
  .topbar .project-name { font-size: 13px; color: var(--text2); }
  .topbar .status { font-size: 11px; padding: 3px 10px; border-radius: 10px; background: var(--surface2); color: var(--text2); margin-left: auto; }

  .conversation { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 6px; }

  .msg { padding: 12px 16px; border-radius: 10px; max-width: 88%; animation: fadeIn 0.3s ease; }
  .msg.user { background: var(--accent); color: #fff; align-self: flex-end; }
  .msg.system { background: var(--surface); border: 1px solid var(--border); align-self: flex-start; width: 100%; }
  .msg.system .hdr { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .msg.system .hdr .tag { font-weight: 500; padding: 1px 6px; border-radius: 4px; font-size: 10px; }
  .msg.system .hdr .tag.ok { background: rgba(34,197,94,0.2); color: var(--green); }
  .msg.system .hdr .tag.warn { background: rgba(245,158,11,0.2); color: var(--amber); }
  .msg.system .hdr .tag.err { background: rgba(239,68,68,0.2); color: var(--red); }
  .msg.system .hdr .tag.info { background: rgba(59,130,246,0.2); color: var(--accent); }
  .msg.system .body { font-size: 13px; line-height: 1.5; }

  .thinking { display: flex; align-items: center; gap: 8px; padding: 8px 16px; color: var(--text2); font-size: 13px; }
  .thinking .dots { display: flex; gap: 4px; }
  .thinking .dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.4s infinite; }
  .thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); } 40% { transform: scale(1); } }

  .input-area { padding: 12px 20px 16px; border-top: 1px solid var(--border); background: var(--surface); }
  .input-row { display: flex; gap: 8px; align-items: center; }
  .input-row input { flex: 1; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface2); color: var(--text); font-size: 14px; outline: none; }
  .input-row input:focus { border-color: var(--accent); }
  .input-row input::placeholder { color: var(--text2); }
  .input-row button { padding: 12px 24px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; white-space: nowrap; }
  .input-row button:hover { opacity: 0.9; }
  .input-row button:disabled { opacity: 0.4; cursor: not-allowed; }
  .input-hint { font-size: 11px; color: var(--text2); margin-top: 6px; text-align: center; }

  .welcome { text-align: center; padding: 40px 20px; }
  .welcome h1 { font-size: 24px; font-weight: 300; margin-bottom: 8px; }
  .welcome p { color: var(--text2); font-size: 14px; max-width: 500px; margin: 0 auto; line-height: 1.6; }
  .welcome .examples { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
  .welcome .examples button { padding: 8px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text2); cursor: pointer; font-size: 12px; }
  .welcome .examples button:hover { background: var(--surface); color: var(--text); border-color: var(--accent); }

  .quick-info { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; margin-top: 8px; }
  .quick-info .qi { background: var(--surface2); border-radius: 6px; padding: 8px 10px; }
  .quick-info .qi .lbl { font-size: 10px; color: var(--text2); text-transform: uppercase; }
  .quick-info .qi .val { font-size: 16px; font-weight: 600; margin-top: 2px; }
  .quick-info .qi .val.green { color: var(--green); }
  .quick-info .qi .val.blue { color: var(--accent); }
</style>
</head>
<body>
<div class="shell">
  <div class="activity-bar">
    <button class="a-btn active" onclick="resetChat()" title="Inicio">🏠</button>
    <div class="bottom"><button class="a-btn" onclick="showHelp()" title="Ayuda">?</button></div>
  </div>

  <div class="workbench">
    <div class="topbar">
      <span class="brand">Stonelytics Studio</span>
      <span class="project-name" id="project-name">—</span>
      <span class="status" id="status-badge">Listo</span>
    </div>

    <div class="conversation" id="conversation"></div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="intention-input" placeholder="¿Qué quieres hacer? (ej: Construye un SaaS para abogados, Analiza el proyecto, Despliega a producción)" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage()}">
        <button id="submit-btn" onclick="sendMessage()">Enviar</button>
      </div>
      <div class="input-hint">Describe tu objetivo — el asistente planificará y ejecutará el trabajo</div>
    </div>
  </div>
</div>

<script>
let isProcessing = false;

async function sendMessage() {
  const input = document.getElementById('intention-input');
  const text = input.value.trim();
  if (!text || isProcessing) return;
  isProcessing = true;
  input.value = '';
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('submit-btn').textContent = 'Trabajando...';

  addMsg('user', text);
  addThinking();

  try {
    const resp = await fetch('/api/shell/conductor', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({intention: text}),
    });
    const data = await resp.json();
    removeThinking();
    displayResponse(data);
  } catch (e) {
    removeThinking();
    addSystemMsg('Error', 'err', e.message);
  }

  isProcessing = false;
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').textContent = 'Enviar';
  scrollDown();
}

function addMsg(type, content) {
  const c = document.getElementById('conversation');
  const m = document.createElement('div');
  m.className = `msg ${type}`;
  m.textContent = content;
  c.appendChild(m);
  scrollDown();
}

function addSystemMsg(title, tag, detail) {
  const c = document.getElementById('conversation');
  c.innerHTML += `<div class="msg system"><div class="hdr"><span>${title}</span><span class="tag ${tag}">${tag.toUpperCase()}</span></div><div class="body">${detail}</div></div>`;
  scrollDown();
}

function addThinking() {
  const c = document.getElementById('conversation');
  c.innerHTML += '<div class="thinking" id="thinking"><span>Trabajando</span><div class="dots"><span></span><span></span><span></span></div></div>';
  scrollDown();
}

function removeThinking() {
  const t = document.getElementById('thinking');
  if (t) t.remove();
}

function displayResponse(data) {
  const c = document.getElementById('conversation');
  data.steps.forEach(s => {
    const tagMap = {'complete':'ok', 'warning':'warn', 'error':'err', 'blocked':'warn', 'info':'info', 'running':'info', 'pending':'info'};
    const tag = tagMap[s.status] || 'info';
    const iconMap = {'running':'⏳', 'complete':'✅', 'error':'❌', 'warning':'⚠️', 'blocked':'🔒', 'info':'💡', 'pending':'⬜'};
    const icon = iconMap[s.status] || '•';
    c.innerHTML += `<div class="msg system"><div class="hdr"><span>${icon} ${s.name}</span><span class="tag ${tag}">${s.status.toUpperCase()}</span></div><div class="body">${s.detail || ''}</div></div>`;
  });
  if (data.duration_seconds !== undefined && data.duration_seconds > 0) {
    c.innerHTML += `<div class="msg system" style="border-color:var(--surface2);margin-top:2px"><div class="body" style="font-size:11px;color:var(--text2)">Completado en ${data.duration_seconds}s</div></div>`;
  }
  scrollDown();
}

function scrollDown() { setTimeout(() => { const c = document.getElementById('conversation'); c.scrollTop = c.scrollHeight; }, 50); }

function resetChat() {
  const c = document.getElementById('conversation');
  c.innerHTML = `<div class="msg system"><div class="body"><div class="welcome">
    <h1>Stonelytics Studio</h1>
    <p>Cuéntame qué necesitas construir o analizar. Yo me encargo del resto.</p>
    <div class="examples">
      <button onclick="quickIntent('Construye un SaaS para abogados')">Construye un SaaS</button>
      <button onclick="quickIntent('Analiza el proyecto')">Analiza el proyecto</button>
      <button onclick="quickIntent('Despliega a producción')">Despliega</button>
      <button onclick="quickIntent('Revisa si hay errores')">Revisa errores</button>
    </div>
  </div></div></div>`;
  document.getElementById('status-badge').textContent = 'Listo';
}

function quickIntent(text) {
  document.getElementById('intention-input').value = text;
  sendMessage();
}

function showHelp() {
  const c = document.getElementById('conversation');
  c.innerHTML += `<div class="msg system"><div class="hdr"><span>💡 Ayuda</span></div><div class="body">
    Puedes pedirme cosas como:<br>
    • <strong>Construye un SaaS para abogados</strong> — planifica y empieza la construcción<br>
    • <strong>Analiza el proyecto</strong> — revisa estructura y madurez<br>
    • <strong>Despliega a producción</strong> — publica la última versión<br>
    • <strong>Revisa si hay errores</strong> — diagnostica y repara incidencias<br>
    • <strong>Cualquier cosa que necesites</strong> — haré lo posible por ayudarte
  </div></div>`;
  scrollDown();
}

// Boot
resetChat();
(async function() {
  try {
    const r = await fetch('/api/shell/workspace');
    const d = await r.json();
    document.getElementById('project-name').textContent = d.identity?.name || '—';
    document.getElementById('status-badge').textContent = d.manifest?.state === 'RUNNING' ? 'Operativo' : 'Detenido';
  } catch(e) {}
})();
</script>
</body>
</html>
