<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stonelytics Studio — Cognitive Workbench</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #334155; --surface3: #1a2332;
    --text: #e2e8f0; --text2: #94a3b8; --accent: #3b82f6;
    --green: #22c55e; --amber: #f59e0b; --red: #ef4444; --border: #334155;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

  .shell { display: grid; grid-template-columns: 48px 1fr; height: 100vh; }

  .activity-bar { background: var(--surface3); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 16px 0; gap: 4px; }
  .activity-bar .a-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; color: var(--text2); font-size: 16px; border: none; background: none; }
  .activity-bar .a-btn:hover { background: var(--surface2); color: var(--text); }
  .activity-bar .a-btn.active { background: var(--accent); color: #fff; }
  .activity-bar .bottom { margin-top: auto; }

  .workbench { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* Top Bar */
  .topbar { display: flex; align-items: center; gap: 12px; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .topbar .brand { font-size: 14px; font-weight: 600; color: var(--accent); }
  .topbar .status { font-size: 11px; padding: 3px 10px; border-radius: 10px; background: var(--surface2); color: var(--text2); margin-left: auto; }
  .topbar .runtime-badge { font-size: 11px; padding: 3px 10px; border-radius: 10px; }
  .topbar .runtime-badge.running { background: rgba(34,197,94,0.2); color: var(--green); }
  .topbar .runtime-badge.stopped { background: rgba(239,68,68,0.2); color: var(--red); }

  /* Main: conversation area */
  .conversation { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 8px; }

  .message { padding: 12px 16px; border-radius: 10px; max-width: 85%; animation: fadeIn 0.3s ease; }
  .message.user { background: var(--accent); color: #fff; align-self: flex-end; }
  .message.system { background: var(--surface); border: 1px solid var(--border); align-self: flex-start; }
  .message.system .header { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .message.system .status { font-weight: 500; }
  .message.system .status.running { color: var(--accent); }
  .message.system .status.complete { color: var(--green); }
  .message.system .status.error { color: var(--red); }
  .message.system .status.warning { color: var(--amber); }
  .message.system .status.blocked { color: var(--amber); }
  .message.system .detail { font-size: 13px; line-height: 1.4; }
  .message.system .detail .label { color: var(--text2); }

  .thinking { display: flex; align-items: center; gap: 8px; padding: 8px 16px; color: var(--text2); font-size: 13px; }
  .thinking .dots { display: flex; gap: 4px; }
  .thinking .dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.4s infinite; }
  .thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); } 40% { transform: scale(1); } }

  /* Input Area */
  .input-area { padding: 12px 20px 16px; border-top: 1px solid var(--border); background: var(--surface); }
  .input-row { display: flex; gap: 8px; align-items: center; }
  .input-row input { flex: 1; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface2); color: var(--text); font-size: 14px; outline: none; }
  .input-row input:focus { border-color: var(--accent); }
  .input-row input::placeholder { color: var(--text2); }
  .input-row button { padding: 12px 24px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; white-space: nowrap; }
  .input-row button:hover { opacity: 0.9; }
  .input-row button:disabled { opacity: 0.4; cursor: not-allowed; }
  .input-hint { font-size: 11px; color: var(--text2); margin-top: 6px; text-align: center; }

  /* Result Cards */
  .result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; margin-top: 8px; }
  .result-card { background: var(--surface2); border-radius: 6px; padding: 10px; }
  .result-card .rlabel { font-size: 10px; color: var(--text2); text-transform: uppercase; }
  .result-card .rvalue { font-size: 18px; font-weight: 600; margin-top: 2px; }
  .result-card .rvalue.green { color: var(--green); }
  .result-card .rvalue.blue { color: var(--accent); }

  .execution-steps { margin-top: 8px; }
  .execution-steps .estep { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; }
  .execution-steps .estep .icon { width: 16px; text-align: center; }

  .event { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; display: flex; gap: 8px; }
  .event:last-child { border-bottom: none; }
  .event .ts { color: var(--text2); font-family: monospace; white-space: nowrap; margin-left: auto; }
  .event .src { color: var(--accent); }
</style>
</head>
<body>
<div class="shell">
  <div class="activity-bar">
    <button class="a-btn active" onclick="resetWorkbench()" title="Cognitive Workbench">💡</button>
    <button class="a-btn" onclick="switchView('runtime')" title="Runtime">⚡</button>
    <button class="a-btn" onclick="switchView('knowledge')" title="Knowledge">🧠</button>
    <button class="a-btn" onclick="switchView('knowledge')" title="Knowledge">🧠</button>
    <button class="a-btn" onclick="switchView('timeline')" title="Timeline">📋</button>
    <div class="bottom"><button class="a-btn" onclick="showShortcuts()" title="Shortcuts">?</button></div>
  </div>

  <div class="workbench" id="workbench">
    <div class="topbar">
      <span class="brand">Stonelytics Studio</span>
      <span style="font-size:12px;color:var(--text2)" id="project-name">Loading...</span>
      <span class="runtime-badge" id="runtime-badge">Runtime: --</span>
      <span class="status" id="status-text">Ready</span>
    </div>

    <div class="conversation" id="conversation">
      <div class="message system">
        <div class="header"><span>Stonelytics Studio</span><span class="status complete">Ready</span></div>
        <div class="detail">Welcome to the Cognitive Workbench. Tell me what you want to build or analyze.</div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="intention-input" placeholder="What do you want to do? (e.g., Build a SaaS for lawyers, Analyze this project, Deploy to production)" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();submitIntention()}">
        <button id="submit-btn" onclick="submitIntention()">Execute</button>
      </div>
      <div class="input-hint">Describe your goal — the Conductor will plan and execute the work</div>
    </div>
  </div>
</div>

<script>
let isExecuting = false;

async function submitIntention() {
  const input = document.getElementById('intention-input');
  const text = input.value.trim();
  if (!text || isExecuting) return;

  isExecuting = true;
  input.value = '';
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('submit-btn').textContent = 'Working...';

  addMessage('user', text);
  addThinking();

  try {
    const resp = await fetch('/api/shell/conductor', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({intention: text}),
    });
    const data = await resp.json();
    removeThinking();
    displayResult(data);
  } catch (e) {
    removeThinking();
    addMessage('system', `<div class="detail" style="color:var(--red)">Error: ${e.message}</div>`);
  }

  isExecuting = false;
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').textContent = 'Execute';
  scrollToBottom();
}

function addMessage(type, content) {
  const conv = document.getElementById('conversation');
  const msg = document.createElement('div');
  msg.className = `message ${type}`;
  if (type === 'user') {
    msg.textContent = content;
  }
  conv.appendChild(msg);
  scrollToBottom();
}

function addThinking() {
  const conv = document.getElementById('conversation');
  const div = document.createElement('div');
  div.className = 'thinking';
  div.id = 'thinking';
  div.innerHTML = '<span>Thinking</span><div class="dots"><span></span><span></span><span></span></div>';
  conv.appendChild(div);
  scrollToBottom();
}

function removeThinking() {
  const t = document.getElementById('thinking');
  if (t) t.remove();
}

function displayResult(data) {
  const conv = document.getElementById('conversation');

  // Summary message
  const summary = document.createElement('div');
  summary.className = 'message system';
  const statusClass = data.status === 'complete' ? 'complete' : 'error';
  summary.innerHTML = `<div class="header"><span>Conductor</span><span class="status ${statusClass}">${data.status.toUpperCase()} — ${data.duration_seconds}s</span></div>`;
  summary.innerHTML += `<div class="detail">Executed: <strong>${data.intention}</strong></div>`;
  conv.appendChild(summary);

  // Steps as execution chain
  const stepsDiv = document.createElement('div');
  stepsDiv.className = 'message system';
  stepsDiv.style.marginTop = '4px';
  let stepsHtml = '<div class="header"><span>Execution Steps</span></div><div class="execution-steps">';
  data.steps.forEach(s => {
    const icons = {running: '⏳', complete: '✅', error: '❌', warning: '⚠️', blocked: '🔒'};
    stepsHtml += `<div class="estep"><span class="icon">${icons[s.status] || '⬜'}</span><span>${s.name}</span><span style="color:var(--text2);font-size:11px;margin-left:auto">${s.detail || ''}</span></div>`;
  });
  stepsHtml += '</div>';
  stepsDiv.innerHTML = stepsHtml;
  conv.appendChild(stepsDiv);

  // Result metrics if available
  const lastStep = data.steps[data.steps.length - 1];
  if (lastStep && lastStep.detail) {
    const result = document.createElement('div');
    result.className = 'message system';
    result.innerHTML = `<div class="header"><span>Result</span></div><div class="detail">${lastStep.detail}</div>`;
    conv.appendChild(result);
  }

  scrollToBottom();
}

function scrollToBottom() {
  const conv = document.getElementById('conversation');
  setTimeout(() => { conv.scrollTop = conv.scrollHeight; }, 50);
}

function resetWorkbench() {
  document.getElementById('conversation').innerHTML = `
    <div class="message system">
      <div class="header"><span>Stonelytics Studio</span><span class="status complete">Ready</span></div>
      <div class="detail">Welcome to the Cognitive Workbench. Tell me what you want to build or analyze.</div>
    </div>`;
  document.getElementById('intention-input').value = '';
  document.getElementById('status-text').textContent = 'Ready';
}

function switchView(view) {
  document.querySelectorAll('.a-btn').forEach(b => b.classList.remove('active'));
  const idx = {runtime:1, knowledge:2, timeline:3, knowledge:4}[view] || 0;
  const btns = document.querySelectorAll('.a-btn');
  if (view === 'runtime') btns[1].classList.add('active');
  else if (view === 'knowledge') btns[2].classList.add('active');
  else if (view === 'timeline') btns[3].classList.add('active');
  else btns[0].classList.add('active');
  document.getElementById('status-text').textContent = `View: ${view}`;

  const conv = document.getElementById('conversation');
  if (view === 'knowledge') {
    conv.innerHTML = `<div class="message system"><div class="header"><span>Knowledge Explorer</span><span class="status complete">Loaded</span></div><div class="detail">Loading knowledge graph...</div></div>`;
    loadKnowledgeExplorer();
  } else if (view === 'runtime') {
    conv.innerHTML = `<div class="message system"><div class="header"><span>Runtime Explorer</span><span class="status complete">Loaded</span></div><div class="detail">Loading runtime state...</div></div>`;
    loadRuntimeExplorer();
  } else if (view === 'timeline') {
    conv.innerHTML = `<div class="message system"><div class="header"><span>Timeline</span><span class="status complete">Loaded</span></div><div class="detail">Loading event history...</div></div>`;
    loadTimelineView();
  }
}

async function loadKnowledgeExplorer() {
  const conv = document.getElementById('conversation');
  try {
    const [graph, patterns, cases, k] = await Promise.all([
      fetchJSON('/api/shell/knowledge/graph'),
      fetchJSON('/api/shell/knowledge/patterns'),
      fetchJSON('/api/shell/knowledge/cases'),
      fetchJSON('/api/shell/knowledge'),
    ]);

    let html = `<div class="message system"><div class="header"><span>Knowledge Base</span><span class="status complete">${k.patterns || 0} patterns · ${k.cases || 0} cases · ${k.reuse || 0}% reuse</span></div></div>`;

    // Graph as entity cards
    html += `<div class="message system"><div class="header"><span>Digital Twin</span></div><div class="detail"><div class="result-grid">`;
    (graph.nodes || []).forEach(n => {
      const cls = n.state === 'ACTIVE' || n.state === 'RUNNING' ? 'green' : 'blue';
      html += `<div class="result-card"><div class="rlabel">${n.type}</div><div class="rvalue ${cls}">${n.label}</div><div style="font-size:10px;color:var(--text2);margin-top:2px">${n.state}</div></div>`;
    });
    html += `</div></div></div>`;

    // Relationships
    html += `<div class="message system"><div class="header"><span>Knowledge Graph</span></div><div class="detail" style="font-family:monospace;font-size:12px;line-height:1.6">`;
    (graph.relationships || []).forEach(r => {
      html += `<div style="padding:2px 0">📦 ${r.source} <span style="color:var(--accent)">─${r.type}→</span> ${r.target}</div>`;
    });
    html += `</div></div>`;

    // Patterns
    if (patterns && patterns.length > 0) {
      html += `<div class="message system"><div class="header"><span>Patterns (${patterns.length})</span></div><div class="detail">`;
      patterns.slice(-5).reverse().forEach(p => {
        html += `<div class="event"><span class="src">[${p.type}]</span><span>${p.title}</span><span class="ts">confidence: ${(p.confidence || 0).toFixed(2)}</span></div>`;
      });
      html += `</div></div>`;
    }

    // Cases
    if (cases && cases.length > 0) {
      html += `<div class="message system"><div class="header"><span>Cases (${cases.length})</span></div><div class="detail">`;
      cases.slice(-5).reverse().forEach(c => {
        html += `<div class="event"><span class="src">${c.action}</span><span>→ ${c.outcome}</span><span class="ts">score: ${(c.score || 0).toFixed(2)}</span></div>`;
      });
      html += `</div></div>`;
    }

    conv.innerHTML = html;
    scrollToBottom();
  } catch(e) {
    conv.innerHTML = `<div class="message system"><div class="header"><span>Error</span></div><div class="detail" style="color:var(--red)">${e.message}</div></div>`;
  }
}

async function loadRuntimeExplorer() {
  const conv = document.getElementById('conversation');
  try {
    const [manifest, age, caps] = await Promise.all([
      fetchJSON('/api/shell/manifest'), fetchJSON('/api/shell/age'), fetchJSON('/api/shell/capabilities'),
    ]);
    const mods = (manifest.modules || []).map(m =>
      `<span style="padding:2px 8px;border-radius:4px;font-size:11px;background:${m.state === 'LOADED' ? 'rgba(34,197,94,0.2)' : 'rgba(239,68,68,0.2)'};color:${m.state === 'LOADED' ? 'var(--green)' : 'var(--red)'}">${m.id}</span>`
    ).join(' ');
    conv.innerHTML = `
      <div class="message system"><div class="header"><span>Runtime</span><span class="status ${manifest.state === 'RUNNING' ? 'complete' : 'error'}">${manifest.state}</span></div></div>
      <div class="message system"><div class="header"><span>Version</span></div><div class="detail">${manifest.version} · ${age.checkpoints || 0} checkpoints</div></div>
      <div class="message system"><div class="header"><span>Modules (${(manifest.modules || []).length})</span></div><div class="detail"><div style="display:flex;gap:4px;flex-wrap:wrap">${mods || '<span style="color:var(--text2)">None</span>'}</div></div>
      <div class="message system"><div class="header"><span>Capabilities (${(caps || []).length})</span></div><div class="detail">${(caps || []).slice(0, 8).map(c => `<div class="event"><span class="src">${c.name}</span><span class="ts">cost: ${c.cost_per_run || 1}</span></div>`).join('')}</div>
    `;
    scrollToBottom();
  } catch(e) {
    conv.innerHTML = `<div class="message system"><div class="detail" style="color:var(--red)">${e.message}</div></div>`;
  }
}

async function loadTimelineView() {
  const conv = document.getElementById('conversation');
  try {
    const history = await fetchJSON('/api/shell/history?limit=100');
    conv.innerHTML = `<div class="message system"><div class="header"><span>Timeline (${history.length} events)</span></div><div class="detail">${(history || []).map(e => `<div class="event"><span class="ts">[${e.ts}]</span><span class="src">${e.source}</span><span>${e.msg}</span></div>`).join('')}</div>`;
    scrollToBottom();
  } catch(e) {
    conv.innerHTML = `<div class="message system"><div class="detail" style="color:var(--red)">${e.message}</div></div>`;
  }
}

function showShortcuts() {
  const conv = document.getElementById('conversation');
  conv.innerHTML += `<div class="message system"><div class="header"><span>Shortcuts</span></div><div class="detail">
    • Type any goal and press Enter to execute<br>
    • "Build a SaaS for lawyers" → full pipeline<br>
    • "Analyze this project" → discovery + indicators<br>
    • "Deploy to production" → deployment<br>
    • "Fix issues" → auto-repair<br>
    • Click 💡 to reset the workbench
  </div></div>`;
  scrollToBottom();
}

// Load identity on boot
(async function() {
  try {
    const resp = await fetch('/api/shell/workspace');
    const data = await resp.json();
    document.getElementById('project-name').textContent = data.identity?.name || 'Unknown';
    const state = data.manifest?.state || 'STOPPED';
    const badge = document.getElementById('runtime-badge');
    badge.textContent = `Runtime: ${state}`;
    badge.className = `runtime-badge ${state === 'RUNNING' ? 'running' : 'stopped'}`;
  } catch(e) {}
})();
</script>
</body>
</html>
